name: camscene
description: Capture image and upload directly to Google Drive
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.10.5+9
  google_sign_in: 6.1.6
  googleapis: ^12.0.0
  http: ^1.2.2
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  path_provider: ^2.1.4
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true